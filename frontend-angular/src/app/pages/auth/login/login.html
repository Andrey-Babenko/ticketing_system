<app-auth-card title="Log in">
  <form (submit)="$event.preventDefault(); submit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" required [value]="email()" (input)="email.set($any($event.target).value)" />
      @if (fieldError('email'); as msg) {
        <mat-error>{{ msg }}</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput type="password" required [value]="password()" (input)="password.set($any($event.target).value)" />
      @if (fieldError('password'); as msg) {
        <mat-error>{{ msg }}</mat-error>
      }
    </mat-form-field>

    <p class="forgot-link"><a routerLink="/forgot-password">Forgot password?</a></p>

    @if (apiError(); as err) {
      @if (!err.field && !notVerified()) {
        <p class="form-error">{{ err.message }}</p>
      }
    }

    <button mat-flat-button color="primary" type="submit" class="full-width" [disabled]="pending()">
      {{ pending() ? 'Logging in…' : 'Log in' }}
    </button>
  </form>

  @if (notVerified()) {
    <div class="resend-box">
      <p>Account not verified?</p>
      <app-resend-verification [email]="email()" />
    </div>
  }

  <p class="switch-link">New here? <a routerLink="/signup">Create an account</a></p>
</app-auth-card>
