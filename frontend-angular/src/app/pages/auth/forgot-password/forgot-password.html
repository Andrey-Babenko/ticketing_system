@if (sentMessage(); as message) {
  <app-auth-card title="Check your email">
    <p>{{ message }}</p>
    <p class="switch-link"><a routerLink="/login">Back to log in</a></p>
  </app-auth-card>
} @else {
  <app-auth-card title="Forgot password">
    <p>Enter your email and we'll send you a link to reset your password.</p>
    <form (submit)="$event.preventDefault(); submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" required [value]="email()" (input)="email.set($any($event.target).value)" />
        @if (fieldError('email'); as msg) {
          <mat-error>{{ msg }}</mat-error>
        }
      </mat-form-field>

      @if (apiError(); as err) {
        @if (!err.field) {
          <p class="form-error">{{ err.message }}</p>
        }
      }

      <button mat-flat-button color="primary" type="submit" class="full-width" [disabled]="pending()">
        {{ pending() ? 'Sending…' : 'Send reset link' }}
      </button>
    </form>
    <p class="switch-link"><a routerLink="/login">Back to log in</a></p>
  </app-auth-card>
}
