<div
  class="board-column"
  [attr.data-testid]="'column-' + state()"
  cdkDropList
  [cdkDropListData]="state()"
  cdkDropListSortingDisabled
  (cdkDropListDropped)="dropped.emit($event)"
>
  <div class="column-header">
    <h2>{{ STATE_LABELS[state()] }}</h2>
    <span class="count">{{ tickets().length }}</span>
  </div>
  <cdk-virtual-scroll-viewport itemSize="100" class="column-scroll" [attr.data-testid]="'column-scroll-' + state()">
    <div *cdkVirtualFor="let ticket of tickets(); trackBy: trackById" class="card-slot">
      <app-ticket-card [ticket]="ticket" [epics]="epics()" [pending]="pendingIds().has(ticket.id)" />
    </div>
  </cdk-virtual-scroll-viewport>
</div>
