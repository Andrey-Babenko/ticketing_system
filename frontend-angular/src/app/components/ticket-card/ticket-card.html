<a
  cdkDrag
  [cdkDragData]="ticket()"
  [cdkDragDisabled]="pending()"
  [routerLink]="['/tickets', ticket().id]"
  [attr.data-testid]="'card-' + ticket().id"
  draggable="false"
  class="ticket-card"
  [class.pending]="pending()"
>
  <span class="type-badge type-{{ ticket().type }}">{{ TYPE_LABELS[ticket().type] }}</span>
  <p class="card-title">{{ ticket().title }}</p>
  @if (epicName(); as name) {
    <p class="card-epic">Epic: {{ name }}</p>
  }
  <p class="card-modified">{{ formatRelative(ticket().modifiedAt) }}</p>

  <div *cdkDragPreview class="ticket-card drag-preview" [attr.data-testid]="'drag-overlay'">
    <span class="type-badge type-{{ ticket().type }}">{{ TYPE_LABELS[ticket().type] }}</span>
    <p class="card-title">{{ ticket().title }}</p>
    @if (epicName(); as name) {
      <p class="card-epic">Epic: {{ name }}</p>
    }
    <p class="card-modified">{{ formatRelative(ticket().modifiedAt) }}</p>
  </div>
</a>
